# Site Information
title: "LLmachine"
email: "kent.sew@gmail.com"
description: >-
  Welcome to the LLmachine website. This platform shares insights and 
  advancements in data science, machine learning, data analysis, and 
  visualization. It provides valuable resources, showcases projects, and 
  engages with the data science community. Stay tuned for in-depth articles, 
  tutorials, and discussions.

# Base URL (Important for GitHub Pages)
baseurl: ""  # Keep this empty if hosted at the root (GitHub Pages)
url: "https://dataforsolution.github.io"  # Ensure correct GitHub Pages URL

# Social Media Links
twitter_username: "SewLiben"
github_username: "Lissan"

# Theme and Plugins
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination Settings
paginate: 5  # Number of posts per page
paginate_path: "/page:num/"

# Permalinks (Ensure Clean URLs)
permalink: pretty

# Markdown Processor
markdown: kramdown

# Collections (For Custom Pages)
collections:
  services:
    output: true
    permalink: /services/:name/
  projects:
    output: true
    permalink: /projects/:name/
  blog:
    output: true
    permalink: /blog/
  contact:
    output: true
    permalink: /contact/

# Defaults (Ensure Correct Layouts)
defaults:
  - scope:
      path: ""
    values:
      layout: "default"  # Ensure "default.html" is inside _layouts/
  - scope:
      path: "_posts"
    values:
      layout: "post"
  - scope:
      path: "services"
    values:
      layout: "page"
  - scope:
      path: "projects"
    values:
      layout: "page"
  - scope:
      path: "blog"
    values:
      layout: "page"
  - scope:
      path: "contact"
    values:
      layout: "page"

# Exclude Unnecessary Files from Build
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# Sass Settings
sass:
  sass_dir: _sass
  style: compressed
