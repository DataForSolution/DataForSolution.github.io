# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "LL Machine Learning"
email: "your-kent.sew@gmail.com"
description: >- # this means to ignore newlines until "baseurl:"
  Welcome to Lissan Liben's professional website. As a dedicated data scientist, I utilize this platform 
  to share insights and advancements in the fields of data science, machine learning, data 
  analysis, and data visualization. This site is crafted to provide valuable resources, 
  showcase my projects, and engage with the data science community. Stay tuned for in-depth 
  articles, tutorials, and discussions. You can edit this line in _config.yml. It will appear 
  in your document head meta (for Google search results) and in your feed.xml site description.
baseurl: "" # Leave this empty if hosting at the root
url: "https://dataforsolution.github.io" # The base hostname & protocol for your site
twitter_username: "SewLiben"
github_username: "Lissan"

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/


