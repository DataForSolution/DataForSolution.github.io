# Site Information
title: "LLmachine"
email: "kent.sew@gmail.com"
description: >-
  Welcome to LLmachine, your hub for AI, data science, and analytics.
  Explore projects, insights, and professional research.

baseurl: ""  # Ensure this is empty unless hosted under a subdirectory
url: "https://dataforsolution.github.io"  # Correct URL for GitHub Pages

# Theme and Plugins
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-sitemap
  - jekyll-assets

# Pagination Settings
paginate: 5  
paginate_path: "/page:num/"  

# Markdown Processor
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    line_numbers: true

# Include and Exclude Paths
include:
  - _includes
  - _layouts
  - _projects
  - assets
  - assets/books
  - .nojekyll
  - favicon.ico
  - courses.html
  - dashboard.html
  - request-submitted.html
  - signin.html
  - signup.html
  - _navigation.html
  - resources.html  # Add resources.html explicitly for inclusion

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md

# Collections
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: true
    permalink: /projects/:path/
  blog:
    output: true
    permalink: /blog/
  faq:
    output: true
    permalink: /faq/:path/
  contact:
    output: true
    permalink: /contact/
  signin:
    output: true
    permalink: /signin/
  signup:
    output: true
    permalink: /signup/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "LLmachine"
  - scope:
      path: "about"
    values:
      layout: "default"
      title: "About LLmachine"
  - scope:
      path: "services"
    values:
      layout: "default"
      title: "Our Services"
  - scope:
      path: "projects"
    values:
      layout: "default"
      title: "Our Projects"
  - scope:
      path: "signin"
    values:
      layout: "default"
      title: "Sign In"
  - scope:
      path: "signup"
    values:
      layout: "default"
      title: "Sign Up"
  - scope:  # Add scope for resources
      path: "resources"
    values:
      layout: "default"
      title: "Resources"

# Permalinks
permalink: pretty

# Sitemap Configuration
sitemap:
  exclude:
    - /404.html
  include:
    - /services/
    - /projects/
    - /blog/
    - /faq/
    - /contact/
    - /signin/
    - /signup/
    - /resources/  # Add resources to sitemap

# SEO Defaults
jekyll_seo_tag:
  social:
    twitter:
      username: "SewLiben"
    github:
      username: "DataForSolution"

# Performance Optimization
cache: true
