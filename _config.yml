# Site Information
title: "LLmachine"
email: "kent.sew@gmail.com"
description: >-
  Welcome to the LLmachine website. This platform shares insights and 
  advancements in data science, machine learning, data analysis, and 
  visualization. It provides valuable resources, showcases projects, and 
  engages with the data science community. Stay tuned for in-depth articles, 
  tutorials, and discussions.

baseurl: "" # Leave empty if hosting at the root (GitHub Pages)
url: "https://dataforsolution.github.io" # Ensure correct GitHub Pages URL

# Social Media Links
twitter_username: "SewLiben"
github_username: "Lissan"

# Author Information
author:
  name: "Lissan Liben"

# Theme and Build Settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination Settings
paginate: 5  # Number of posts per page
paginate_path: "/page:num/"

# Permalinks
permalink: pretty  # Use clean URLs (without .html extensions)

# Markdown Processor
markdown: kramdown

# Collections for Services and Projects
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: true
    permalink: /projects/:path/

# Defaults (Ensuring Layouts are Applied)
defaults:
  - scope:
      path: ""
    values:
      layout: "home"
  - scope:
      path: "_posts"
    values:
      layout: "post"
  - scope:
      path: "services"
    values:
      layout: "page"
  - scope:
      path: "projects"
    values:
      layout: "page"

# Exclude Unnecessary Files
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: true
    permalink: /projects/:path/

# Permalink & Collections
permalink: pretty
collections:
  services:
    output: true
    permalink: /services/
  projects:
    output: true
    permalink: /projects/
  blog:
    output: true
    permalink: /blog/
  contact:
    output: true
    permalink: /contact/

defaults:
  - scope:
      path: "services"
    values:
      layout: "page"
  - scope:
      path: "projects"
    values:
      layout: "page"
  - scope:
      path: "blog"
    values:
      layout: "page"
  - scope:
      path: "contact"
    values:
      layout: "page"
sass:
  sass_dir: _sass
  style: compressed
