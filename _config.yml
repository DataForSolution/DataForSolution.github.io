# Site Information
title: "LLmachine"
email: "kent.sew@gmail.com"
description: >-
  Welcome to LLmachine, your hub for AI, data science, and analytics.
  Explore projects, insights, and professional research.

# Base URL & Site URL (For GitHub Pages)
baseurl: ""  # Keep empty unless hosted under a subdirectory
url: "https://dataforsolution.github.io"  # Correct URL for GitHub Pages

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-sitemap
  # - jekyll-assets        # Not supported by GitHub Pages
  # - jekyll-archives      # Not supported by GitHub Pages
  - jekyll-redirect-from
  # - jekyll-robots        # Not supported by GitHub Pages

# Pagination Settings
paginate: 5
paginate_path: "/blog/page:num/"

# Markdown Processor
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    line_numbers: true

# Include and Exclude Paths
include:
  - _includes
  - _layouts
  - _projects
  - assets
  - assets/css
  - assets/js
  - assets/books
  - favicon.ico
  - courses.html
  - dashboard.html
  - request-submitted.html
  - signin.html
  - signup.html
  - ebooks.md
  - navigation.html
  - resources.html
  - index.html  # Ensures homepage is included

exclude:
  - .sass-cache/
  - README.md
  - .jekyll-cache/
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: true
    permalink: /projects/:path/
  blog:
    output: true
    permalink: /blog/
  faq:
    output: true
    permalink: /faq/:path/
  contact:
    output: true
    permalink: /contact/
  signin:
    output: true
    permalink: /signin/
  signup:
    output: true
    permalink: /signup/
  resources:
    output: true
    permalink: /resources/:path/

# Defaults (Applies layout to pages)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "LLmachine"
  - scope:
      path: "about"
    values:
      layout: "default"
      title: "About LLmachine"
  - scope:
      path: "services"
    values:
      layout: "default"
      title: "Our Services"
  - scope:
      path: "projects"
    values:
      layout: "default"
      title: "Our Projects"
  - scope:
      path: "signin"
    values:
      layout: "default"
      title: "Sign In"
  - scope:
      path: "signup"
    values:
      layout: "default"
      title: "Sign Up"
  - scope:
      path: "blog"
    values:
      layout: "default"
      title: "Blog"
  - scope:
      path: "resources"
    values:
      layout: "default"
      title: "Resources"

# Permalinks
permalink: pretty

# Sitemap Configuration
sitemap:
  exclude:
    - /404.html
  include:
    - /services/
    - /projects/
    - /blog/
    - /faq/
    - /contact/
    - /ebooks.md
    - /signin/
    - /signup/
    - /resources/
    - /index/
# SEO Defaults
jekyll_seo_tag:
  social:
    twitter:
      username: "SewLiben"
    github:
      username: "DataForSolution"
  description: "LLmachine provides AI, Data Science, and Analytics solutions for businesses and researchers."

# Performance Optimization
cache: true

# Force GitHub Pages Rebuild
future: true
