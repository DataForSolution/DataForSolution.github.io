# Site Information
title: "LLmachine"
email: "kent.sew@gmail.com"
description: >-
  Welcome to LLmachine, your hub for AI, data science, and analytics.
  Explore projects, insights, and professional research.

baseurl: ""  
url: "https://dataforsolution.github.io"  

# Theme and Plugins
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-include-cache  # Enables includes caching for better performance

# Pagination Settings
paginate: 5  
paginate_path: "/page:num/"  

# Markdown Processor
markdown: kramdown
kramdown:
  input: GFM # Enables GitHub-flavored markdown

# Include and Exclude Paths
include:
  - _includes
  - _layouts
  - assets
  - .nojekyll

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# Collections
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: true
    permalink: /projects/:path/
  blog:
    output: true
    permalink: /blog/
  contact:
    output: true
    permalink: /contact/

# Defaults (Optional)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "LLmachine"

# Permalinks
permalink: pretty
