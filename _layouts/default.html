<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LLmachine - AI, Data Science, and Analytics">
    <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, LLmachine">
    <meta name="author" content="LLmachine">
    <title>{{ page.title }}</title>

    <!-- Corrected CSS and JS Paths -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
    <script src="{{ site.baseurl }}/assets/js/script.js" defer></script>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="LLmachine - AI, Data Science & Analytics">
    <meta property="og:description" content="Explore AI, data science projects, and innovative solutions at LLmachine.">
    <meta property="og:image" content="https://dataforsolution.github.io/assets/images/thumbnail.png">
    <meta property="og:url" content="https://dataforsolution.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="LLmachine">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon -->
    <link rel="icon" href="{{ site.baseurl }}/assets/images/favicon.ico" type="image/x-icon">

    <!-- Preload Key Resources for Faster Loading -->
    <link rel="preload" as="style" href="{{ site.baseurl }}/assets/css/style.css">
    <link rel="preload" as="script" href="{{ site.baseurl }}/assets/js/script.js">

    <!-- JavaScript to Ensure Page Loads Properly -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.style.visibility = "visible";
        });
    </script>
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; visibility: hidden;">
    
    <!-- Include Navigation -->
    {% include navigation.html %}

    <!-- Main Content Section -->
    <main style="max-width: 1200px; margin: auto; padding: 20px; flex-grow: 1;">
        {{ content }}
    </main>

    <!-- Footer -->
    {% include footer.html %}

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LLmachine",
      "url": "https://dataforsolution.github.io/",
      "logo": "https://dataforsolution.github.io/assets/images/thumbnail.png",
      "sameAs": [
        "https://twitter.com/SewLiben",
        "https://github.com/DataForSolution"
      ]
    }
    </script>

</body>
</html>
