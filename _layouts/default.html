<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ SEO Meta Tags -->
  <meta name="description" content="LLmachine - AI, Data Science, Projects, E-books, and Analytics Solutions. Learn and explore with expert tools and resources.">
  <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, Free E-books, LLmachine, Projects">
  <meta name="author" content="LLmachine">
  <meta name="robots" content="index, follow">

  <!-- ✅ Dynamic Title -->
  <title>{{ page.title | default: "LLmachine" }}</title>

  <!-- ✅ Styles & Scripts -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/script.js' | relative_url }}" defer></script>

  <!-- ✅ Social Media / Open Graph Meta -->
  <meta property="og:title" content="{{ page.title | default: 'LLmachine - AI, Data Science & Analytics' }}">
  <meta property="og:description" content="Explore AI, data science projects, and innovative solutions at LLmachine.">
  <meta property="og:image" content="{{ '/assets/images/thumbnail.png' | relative_url }}">
  <meta property="og:url" content="https://dataforsolution.github.io{{ page.url }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="LLmachine">

  <!-- ✅ Twitter Meta -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: 'LLmachine' }}">
  <meta name="twitter:description" content="Discover top-tier AI and data science resources from LLmachine.">
  <meta name="twitter:image" content="{{ '/assets/images/thumbnail.png' | relative_url }}">

  <!-- ✅ Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNB09GQ72T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-FNB09GQ72T');
  </script>

  <!-- ✅ Favicon -->
  <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">

  <!-- ✅ Preload Performance -->
  <link rel="preload" as="style" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preload" as="script" href="{{ '/assets/js/script.js' | relative_url }}">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">
  
  <!-- Include Navigation -->
  {% include navigation.html %}

  <!-- Background Video (Only for Home Page) -->
  {% if page.title == "Home" %}
  <div id="home-background">
      <video autoplay loop muted playsinline>
          <source src="{{ '/assets/videos/background-video.mp4' | relative_url }}" type="video/mp4">
          <!-- Fallback image -->
          <img src="{{ '/assets/images/video-fallback.jpg' | relative_url }}" alt="Background Image">
      </video>
  </div>
  {% endif %}

  <!-- Main Content Section -->
  <main style="max-width: 1200px; margin: auto; padding: 20px; flex-grow: 1;">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 LLmachine. Follow us on 
      <a href="https://twitter.com/SewLiben" target="_blank">Twitter</a> and 
      <a href="https://github.com/DataForSolution" target="_blank">GitHub</a>.
    </p>
  </footer>

  <!-- ✅ Structured Data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "LLmachine",
    "url": "https://dataforsolution.github.io/",
    "logo": "{{ '/assets/images/thumbnail.png' | relative_url }}",
    "sameAs": [
      "https://twitter.com/SewLiben",
      "https://github.com/DataForSolution"
    ]
  }
  </script>
<!-- ✅ Chatbot Button & Panel -->
<div id="chatbot-toggle">💬</div>
<div id="chatbot-panel">
  <div id="chatbot-header">LLmachine Chat Assistant <span id="chatbot-close">&times;</span></div>
  <div id="chatbot-body">
    <div class="chat-message bot">Hi! I'm your AI assistant. Ask me about data science, AI, or LLmachine!</div>
  </div>
  <form id="chatbot-form">
    <input type="text" id="chatbot-input" placeholder="Type a message..." required />
    <button type="submit">Send</button>
  </form>
</div>

<!-- ✅ Chatbot Styles -->
<style>
  #chatbot-toggle {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #007BFF;
    color: white;
    padding: 12px 14px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 9999;
  }

  #chatbot-panel {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 25px;
    width: 300px;
    height: 400px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    z-index: 9999;
  }

  #chatbot-header {
    background: #007BFF;
    color: white;
    padding: 10px;
    font-weight: bold;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #chatbot-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
    background: #f9f9f9;
  }

  .chat-message {
    margin: 6px 0;
    line-height: 1.4em;
  }

  .chat-message.bot {
    color: #222;
  }

  .chat-message.user {
    text-align: right;
    color: #007BFF;
  }

  #chatbot-form {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ccc;
  }

  #chatbot-input {
    flex: 1;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  #chatbot-form button {
    margin-left: 8px;
    padding: 8px 12px;
    background-color: #007BFF;
    border: none;
    color: white;
    border-radius: 4px;
    cursor: pointer;
  }
</style>

<!-- ✅ Chatbot Behavior -->
<script>
  const toggle = document.getElementById('chatbot-toggle');
  const panel = document.getElementById('chatbot-panel');
  const close = document.getElementById('chatbot-close');
  const form = document.getElementById('chatbot-form');
  const input = document.getElementById('chatbot-input');
  const body = document.getElementById('chatbot-body');

  toggle.onclick = () => panel.style.display = 'flex';
  close.onclick = () => panel.style.display = 'none';

  form.onsubmit = (e) => {
    e.preventDefault();
    const userText = input.value;
    appendMessage('user', userText);
    input.value = '';

    // Simulated bot reply
    setTimeout(() => {
      const reply = getBotReply(userText);
      appendMessage('bot', reply);
    }, 600);
  };

  function appendMessage(sender, message) {
    const div = document.createElement('div');
    div.className = `chat-message ${sender}`;
    div.textContent = message;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function getBotReply(msg) {
    msg = msg.toLowerCase();
    if (msg.includes('ebook')) return 'You can explore free e-books under the E-Books section.';
    if (msg.includes('project')) return 'Check out our AI & data science projects on the Projects page.';
    if (msg.includes('service')) return 'We offer Business Analytics, Healthcare Consulting, and more under Services.';
    if (msg.includes('contact')) return 'You can reach us via the Contact page. We’d love to hear from you!';
    return 'Thanks for your message! I\'ll get back to you with more info soon.';
  }
</script>


</body>
</html>
