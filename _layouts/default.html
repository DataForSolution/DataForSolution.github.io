<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LLmachine - AI, Data Science & Analytics">
    <meta name="author" content="LLmachine">
    <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, LLmachine">
    <meta property="og:title" content="LLmachine - AI, Data Science & Analytics">
    <meta property="og:description" content="Your hub for AI, Data Science, and Analytics. Explore projects, insights, and professional research.">
    <meta property="og:image" content="{{ '/assets/images/og-image.jpg' | relative_url }}">
    <meta property="og:url" content="{{ site.url | default: site.baseurl }}">
    <meta name="twitter:card" content="summary_large_image">
    <title>{{ page.title | default: "LLmachine" }}</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Navigation Bar -->
    {% include navigation.html %}

    <!-- Main Content (Fixing height issue) -->
    <main style="padding: 20px; margin: auto; max-width: 1200px; flex-grow: 1;">
        {{ content }}
    </main>

    <!-- Footer (Fixed so it doesn't push content down) -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 20px 10px; margin-top: auto; font-size: 0.9em;">
        <p>&copy; {{ "now" | date: "%Y" }} LLmachine. All Rights Reserved.</p>
        <div style="margin: 10px 0;">
            <a href="https://twitter.com/SewLiben" target="_blank" style="color: #1DA1F2; text-decoration: none; margin: 0 10px; transition: color 0.3s;">Twitter</a>
            <a href="https://github.com/DataForSolution" target="_blank" style="color: #6e5494; text-decoration: none; margin: 0 10px; transition: color 0.3s;">GitHub</a>
        </div>
        <p>Designed with ❤️ by LLmachine.</p>
    </footer>

    <!-- JavaScript -->
    <script src="{{ site.baseurl }}/assets/js/script.js"></script>

    <!-- Subscription Modal for Resources Section -->
    <div id="subscription-modal" class="modal">
        <div class="modal-content">
            <h2>Subscribe to Access</h2>
            <p>Please enter your email to access this resource.</p>
            <form id="subscription-form">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
            <button id="close-modal">Cancel</button>
        </div>
    </div>

    <script>
        // JavaScript for handling the modal functionality
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById("subscription-modal");
            const closeModal = document.getElementById("close-modal");
            const subscriptionForm = document.getElementById("subscription-form");
            let selectedBookUrl = ""; // To store the selected book URL

            // Show the subscription modal when "Read" is clicked
            document.querySelectorAll(".read-book-btn").forEach(button => {
                button.addEventListener("click", () => {
                    selectedBookUrl = button.dataset.bookUrl; // Store the book URL
                    modal.style.display = "block";
                });
            });

            // Close the modal
            closeModal.addEventListener("click", () => {
                modal.style.display = "none";
            });

            // Handle the subscription form submission
            subscriptionForm.addEventListener("submit", event => {
                event.preventDefault();
                const email = subscriptionForm.querySelector("input[type='email']").value.trim();

                if (email) {
                    alert("Thank you for subscribing! You can now access the resource.");
                    modal.style.display = "none";

                    // Open the resource in a new tab
                    if (selectedBookUrl) {
                        window.open(selectedBookUrl, "_blank");
                    }
                } else {
                    alert("Please enter a valid email to subscribe.");
                }
            });
        });
    </script>

    <style>
        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 500px;
            text-align: center;
        }
    </style>
</body>
</html>
