<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LLmachine - AI, Data Science & Analytics">
    <meta name="author" content="LLmachine">
    <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, LLmachine">
    <title>{{ page.title | default: "LLmachine" }}</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    {% include navigation.html %}

    <!-- Hero Section -->
    {% if page.title == "Home" %}
    <header style="background-color: #4CAF50; color: white; padding: 50px 20px; text-align: center;">
        <h1 style="font-size: 2.5em; font-weight: bold;">Welcome to LLmachine</h1>
        <p style="font-size: 1.2em; margin-top: 10px;">Your hub for AI, Data Science, and Analytics</p>
    </header>
    {% endif %}

    <!-- Main Content -->
    <main style="padding: 20px; margin: auto; max-width: 1200px;">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 20px 10px; margin-top: 40px; font-size: 0.9em;">
        <p>&copy; {{ "now" | date: "%Y" }} LLmachine. All Rights Reserved.</p>
        <div style="margin: 10px 0;">
            <a href="https://twitter.com/SewLiben" target="_blank" style="color: #1DA1F2; text-decoration: none; margin: 0 10px;">Twitter</a>
            <a href="https://github.com/DataForSolution" target="_blank" style="color: #6e5494; text-decoration: none; margin: 0 10px;">GitHub</a>
        </div>
        <p>Designed with ❤️ by LLmachine.</p>
    </footer>

    <!-- JavaScript -->
    <script src="{{ site.baseurl }}/assets/js/script.js"></script>
</body>
</html>
