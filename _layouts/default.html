<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ SEO Meta Tags -->
  <meta name="description" content="LLmachine - AI, Data Science, Projects, E-books, and Analytics Solutions. Learn and explore with expert tools and resources.">
  <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, Free E-books, LLmachine, Projects">
  <meta name="author" content="LLmachine">
  <meta name="robots" content="index, follow">

  <!-- ✅ Dynamic Title -->
  <title>{{ page.title | default: "LLmachine" }}</title>

  <!-- ✅ Styles & Scripts -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/script.js' | relative_url }}" defer></script>

  <!-- ✅ Social Media / Open Graph Meta -->
  <meta property="og:title" content="{{ page.title | default: 'LLmachine - AI, Data Science & Analytics' }}">
  <meta property="og:description" content="Explore AI, data science projects, and innovative solutions at LLmachine.">
  <meta property="og:image" content="{{ '/assets/images/thumbnail.png' | relative_url }}">
  <meta property="og:url" content="https://dataforsolution.github.io{{ page.url }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="LLmachine">

  <!-- ✅ Twitter Meta -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: 'LLmachine' }}">
  <meta name="twitter:description" content="Discover top-tier AI and data science resources from LLmachine.">
  <meta name="twitter:image" content="{{ '/assets/images/thumbnail.png' | relative_url }}">

  <!-- ✅ Favicon -->
  <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">

  <!-- ✅ Performance: Preload -->
  <link rel="preload" as="style" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preload" as="script" href="{{ '/assets/js/script.js' | relative_url }}">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">
  
  <!-- Include Navigation -->
  {% include navigation.html %}

  <!-- Background Video (Only for Home Page) -->
  {% if page.title == "Home" %}
  <div id="home-background">
      <video autoplay loop muted playsinline>
          <source src="{{ '/assets/videos/background-video.mp4' | relative_url }}" type="video/mp4">
          <!-- Fallback image -->
          <img src="{{ '/assets/images/video-fallback.jpg' | relative_url }}" alt="Background Image">
      </video>
  </div>
  {% endif %}

  <!-- Main Content Section -->
  <main style="max-width: 1200px; margin: auto; padding: 20px; flex-grow: 1;">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 LLmachine. Follow us on 
      <a href="https://twitter.com/SewLiben" target="_blank">Twitter</a> and 
      <a href="https://github.com/DataForSolution" target="_blank">GitHub</a>.
    </p>
  </footer>

  <!-- ✅ Structured Data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "LLmachine",
    "url": "https://dataforsolution.github.io/",
    "logo": "{{ '/assets/images/thumbnail.png' | relative_url }}",
    "sameAs": [
      "https://twitter.com/SewLiben",
      "https://github.com/DataForSolution"
    ]
  }
  </script>

</body>
</html>
