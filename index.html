<!-- Chat Interface Section -->
<div id="chat-section" style="margin: 20px auto; text-align: center;">
    <h2>Chat with Us</h2>
    <div class="chat-container" style="display: inline-block; width: 300px; border: 1px solid #ccc; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);">
        <div id="messages" style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin-bottom: 10px; height: 200px;"></div>
        <div class="input-container" style="display: flex; gap: 10px;">
            <input type="text" id="userInput" placeholder="Type your message here..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="sendMessage()" style="padding: 10px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">Send</button>
        </div>
    </div>
</div>

<!-- Background Video Section -->

        <source src="{{ '/assets/videos/neural_network.mp4' | relative_url }}" type="video/mp4">
        <img src="{{ '/assets/images/video-fallback.jpg' | relative_url }}" alt="AI Neural Network Visualization">

<!-- JavaScript -->
<script src="{{ '/assets/js/script.js' | relative_url }}"></script>
<script>
    // Chatbot Logic
    function sendMessage() {
        const userInput = document.getElementById("userInput");
        const messages = document.getElementById("messages");

        if (userInput.value.trim() === "") return;

        // Display user message
        const userMessage = document.createElement("div");
        userMessage.textContent = `You: ${userInput.value}`;
        userMessage.style.textAlign = "left";
        messages.appendChild(userMessage);

        // Call your chatbot logic here
        fetchChatGPTResponse(userInput.value).then((response) => {
            const botMessage = document.createElement("div");
            botMessage.textContent = `Bot: ${response}`;
            botMessage.style.textAlign = "right";
            messages.appendChild(botMessage);
            messages.scrollTop = messages.scrollHeight; // Auto-scroll
        });

        userInput.value = ""; // Clear input
    }

    async function fetchChatGPTResponse(userMessage) {

    }
</script>
