<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LLmachine - Professional AI, Data Science & Analytics Services">
    <meta name="keywords" content="AI, Data Science, Machine Learning, Analytics, LLmachine">
    <meta name="author" content="LLmachine">
    <title>{{ page.title }}</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="LLmachine - AI, Data Science & Analytics">
    <meta property="og:description" content="Explore AI, data science projects, and innovative solutions at LLmachine.">
    <meta property="og:image" <meta property="og:image" content="https://dataforsolution.github.io/assets/images/thumbnail.png?v=1">
    <meta property="og:image" content="https://dataforsolution.github.io/assets/images/thumbnail.png?v=2">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://dataforsolution.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="LLmachine">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Include Navigation -->
    {% include navigation.html %}

    <!-- Main Content Section (Semantic Structure) -->
    <section style="max-width: 1200px; margin: auto; padding: 20px; flex-grow: 1;">
        {{ content }}
    </section>

    <!-- Footer (Fixed to Stay Properly Positioned) -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 10px; margin-top: auto; font-size: 0.9em;">
        <p>&copy; 2025 LLmachine. Follow me on 
            <a href="https://twitter.com/SewLiben" target="_blank" rel="noopener noreferrer" style="color: #1DA1F2;">Twitter</a> and 
            <a href="https://github.com/DataForSolution" target="_blank" rel="noopener noreferrer" style="color: #6e5494;">GitHub</a>.
        </p>
    </footer>

    <!-- Structured Data for Rich Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LLmachine",
      "url": "https://dataforsolution.github.io/",
      "logo": "https://dataforsolution.github.io/assets/images/thumbnail.png",
      "sameAs": [
        "https://twitter.com/SewLiben",
        "https://github.com/DataForSolution"
      ]
    }
    </script>

    <!-- JavaScript -->
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
