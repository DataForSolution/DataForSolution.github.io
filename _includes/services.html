{% if page.url == "/services/" %}
<section id="services"> 
    <h2>Our Services</h2>
    <ul>
        <li><a href="#" onclick="showServiceDetails('business-analytics')">Business Analytics</a></li>
        <li><a href="#" onclick="showServiceDetails('data-entry')">Data Entry</a></li>
        <li><a href="#" onclick="showServiceDetails('data-reporting')">Data Reporting</a></li>
        <li><a href="#" onclick="showServiceDetails('strategic-planning')">Strategic Planning</a></li>
        <li><a href="#" onclick="showServiceDetails('healthcare-consulting')">Healthcare Consulting</a></li>
        <li><a href="#" onclick="showServiceDetails('financial-analysis')">Financial Analysis</a></li>
        <li><a href="#" onclick="showServiceDetails('market-research')">Market Research</a></li>
    </ul>

    <!-- Service Details Section -->
    <div id="service-details"></div>
</section>

<!-- JavaScript to Display Service Details -->
<script>
    function showServiceDetails(service) {
        const details = {
            "business-analytics": "We provide insights to drive business decisions with AI-driven data analysis.",
            "data-entry": "Accurate and efficient data entry services to ensure reliable records.",
            "data-reporting": "Custom data reports and visualization for effective decision-making.",
            "strategic-planning": "Helping businesses align data strategies with business goals.",
            "healthcare-consulting": "Providing AI-powered solutions for healthcare analytics and imaging.",
            "financial-analysis": "Data-driven financial insights to optimize budgeting and investments.",
            "market-research": "Market trend analysis and consumer behavior insights."
        };

        document.getElementById("service-details").innerHTML = `<p>${details[service]}</p>`;
        document.getElementById("service-details").style.display = "block";
    }
    {% include navigation.html %}

</script>
{% endif %}
